<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <section
        class="max-w-300 m-auto flex flex-col justify-between items-start md:items-center p-4 md:flex-row"
      >
        <div class="flex w-full items-center justify-between md:w-fit">
          <span class="text-emerald-500 text-2xl font-bold">Cultivate</span>

          <label for="check" class="md:hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="24px"
              viewBox="0 -960 960 960"
              width="24px"
              fill="#1f1f1f"
            >
              <path
                d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"
              />
            </svg>
          </label>
        </div>
        <input type="checkbox" id="check" class="peer hidden" />
        <nav class="peer-checked:block hidden md:block py-3">
          <ul
            class="flex flex-col md:flex-row items-start md:items-center gap-5"
          >
            <li>
              <a
                href=""
                class="text-lg text-gray-700 hover:text-emerald-500 hover:border-b-2 hover:border-emerald-500 p-1"
                >Home</a
              >
            </li>
            <li>
              <a
                href=""
                class="text-lg text-gray-700 hover:text-emerald-500 hover:border-b-2 hover:border-emerald-500 p-1"
                >About Us</a
              >
            </li>
            <li>
              <a
                href=""
                class="text-lg text-gray-700 hover:text-emerald-500 hover:border-b-2 hover:border-emerald-500 p-1"
                >Course</a
              >
            </li>
            <li>
              <a
                href=""
                class="text-lg text-gray-700 hover:text-emerald-500 hover:border-b-2 hover:border-emerald-500 p-1"
                >Instructors</a
              >
            </li>
          </ul>
        </nav>

        <div
          class="peer-checked:flex hidden md:flex flex-col md:flex-row items-center w-full md:w-fit gap-4"
        >
          <button
            class="bg-white text-emerald-500 border border-emerald-500 border-solid px-5 py-2 rounded-md cursor-pointer hover:bg-emerald-50 w-full md:w-fit"
          >
            Login
          </button>
          <button
            class="text-white bg-emerald-500 border border-emerald-500 border-solid px-5 py-2 rounded-md cursor-pointer hover:bg-emerald-700 shadow-md shadow-emerald-300 w-full md:w-fit"
          >
            Sign Up
          </button>
        </div>
      </section>
    </header>

    <section></section>
  </body>
</html>
